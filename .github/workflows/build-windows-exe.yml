name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile `
            --name NFCrecord `
            --paths src `
            --hidden-import FreeSimpleGUI `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NFCrecord-${{ github.run_number }}
          path: dist/NFCrecord.exe
          retention-days: 30

      - name: Delete existing release if exists
        run: |
          gh release delete "v${{ github.run_number }}" --yes 2>$null
          exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release notes file
        run: |
          @"
          # NFC Sheets Logger - Windows Executable

          Download ``NFCrecord.exe`` and run it on Windows.

          ## Quick Start

          1. Download ``NFCrecord.exe`` below
          2. Create a ``config`` folder next to the EXE
          3. Copy ``config.yaml`` and ``credentials.json`` into the ``config`` folder
          4. Run ``NFCrecord.exe``

          See [Setup Guide](https://github.com/${{ github.repository }}/blob/main/setup/README_SETUP.md) for details.
          "@ | Out-File -FilePath release_notes.md -Encoding utf8

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" `
            --title "Release v${{ github.run_number }}" `
            --notes-file release_notes.md `
            dist/NFCrecord.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
