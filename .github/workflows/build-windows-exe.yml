name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile `
            --name NFCrecord `
            --add-data "src:src" `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NFCrecord-${{ github.run_number }}
          path: dist/NFCrecord.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: dist/NFCrecord.exe
          body: |
            # NFC Sheets Logger - Windows Executable

            Download `NFCrecord.exe` and run it on Windows.

            **Built at**: ${{ github.event.head_commit.timestamp }}

            ## Quick Start

            1. Download `NFCrecord.exe` below
            2. Create a `config` folder next to the EXE
            3. Copy `config.yaml` and `credentials.json` into the `config` folder
            4. Run `NFCrecord.exe`

            See [Setup Guide](https://github.com/${{ github.repository }}/blob/main/setup/README_SETUP.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
