name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile `
            --name NFCrecord `
            --paths src `
            --hidden-import FreeSimpleGUI `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NFCrecord-${{ github.run_number }}
          path: dist/NFCrecord.exe
          retention-days: 30

      - name: Delete existing release if exists
        run: |
          gh release delete "v${{ github.run_number }}" --yes 2>$null
          exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release notes file
        run: |
          @"
          # NFC Sheets Logger - Windows 実行ファイル

          NFC カードタッチを Google Sheets に自動記録するアプリケーションです。

          ## セットアップ

          1. 下の ``NFCrecord.exe`` をダウンロード
          2. EXE と同じフォルダに ``config`` フォルダを作成
          3. ``config`` フォルダに ``config.yaml`` と ``credentials.json`` を配置
          4. ``NFCrecord.exe`` を実行

          ## 操作方法

          | キー | 動作 |
          |------|------|
          | **1** | 変更あり |
          | **2** | 変更なし |
          | **3** | 疑義照会（患者番号入力） |
          | 5秒無操作 | 変更あり（デフォルト） |

          詳細は [README](https://github.com/${{ github.repository }}/blob/main/README.md) / [セットアップガイド](https://github.com/${{ github.repository }}/blob/main/setup/README_SETUP.md) を参照してください。
          "@ | Out-File -FilePath release_notes.md -Encoding utf8

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" `
            --title "Release v${{ github.run_number }}" `
            --notes-file release_notes.md `
            dist/NFCrecord.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
