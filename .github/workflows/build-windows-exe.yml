name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile `
            --name NFCrecord `
            --add-data "src:src" `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NFCrecord-${{ github.run_number }}
          path: dist/NFCrecord.exe
          retention-days: 30

      - name: Create Release with GitHub CLI
        run: |
          gh release create v${{ github.run_number }} `
            --title "Release v${{ github.run_number }}" `
            --notes "# NFC Sheets Logger - Windows Executable`n`nDownload \`NFCrecord.exe\` and run it on Windows.`n`n## Quick Start`n`n1. Download \`NFCrecord.exe\` below`n2. Create a \`config\` folder next to the EXE`n3. Copy \`config.yaml\` and \`credentials.json\` into the \`config\` folder`n4. Run \`NFCrecord.exe\``n`nSee [Setup Guide](https://github.com/${{ github.repository }}/blob/main/setup/README_SETUP.md) for details." `
            dist/NFCrecord.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
